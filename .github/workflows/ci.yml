name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # pixi.toml targets linux-64 only, so CI runs on Linux.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          # Only the CPU 'default' env; 'bench' needs a CUDA GPU.
          environments: default
          cache: true

      - name: Run tests
        run: pixi run -e default test

      - name: Lint
        run: pixi run -e default lint
