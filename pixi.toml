[workspace]
authors = ["Paul Link <cq3730@partner.kit.edu>"]
channels = ["pytorch", "conda-forge"]
name = "multiatoms"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "pytest"
lint = "ruff check ."
format = "ruff format ."
bench = "python benchmarks/measure_duty_cycle.py"

[pypi-dependencies]
multiatoms = { path = ".", editable = true }

[dependencies]
python = ">=3.10"
numpy = "*"
ase = ">=3.22"
greenlet = ">=3"
pytorch = { version = ">=2.0", channel = "pytorch" }
pytest = "*"
ruff = "*"

# CPU PyTorch (laptop / default). `cpuonly` forces the CPU build.
[feature.cpu.dependencies]
cpuonly = { version = "*", channel = "pytorch" }

# Benchmark / GPU env: mirrors the real ML potential (torch_geometric SchNet) so
# the duty-cycle benchmark sees a representative GPU kernel mix (radius graph +
# message passing + autograd forces), not a dense MLP stand-in. This is the only
# GPU environment -- the synthetic model runs here too (it never imports
# torch_geometric, so the install just sits unused).
#
# SchNet's radius_graph needs `torch_cluster`, installed from a wheel that is
# pinned to an exact torch + CUDA + python build. We reuse the ML repo's proven
# wheel (torch 2.5 / cu118 / cp311), so this whole feature must pin to match it.
# cu118 binaries run fine on CUDA 12 drivers (backward compatible).
[feature.bench]
channels = ["nvidia", "pytorch", "conda-forge"]

[feature.bench.system-requirements]
cuda = "11.8"

[feature.bench.dependencies]
python = ">=3.11,<3.12"
pytorch = { version = ">=2.5.1,<2.6", channel = "pytorch" }
pytorch-cuda = { version = "11.8.*", channel = "pytorch" }
cudatoolkit = { version = "11.8.*", channel = "conda-forge" }
torch-geometric = "*"

[feature.bench.pypi-dependencies]
torch_cluster = { url = "https://data.pyg.org/whl/torch-2.5.0%2Bcu118/torch_cluster-1.6.3%2Bpt25cu118-cp311-cp311-linux_x86_64.whl" }

[environments]
default = { features = ["cpu"] }
bench = { features = ["bench"] }
