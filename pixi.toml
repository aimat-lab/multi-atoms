[workspace]
authors = ["Paul Link <cq3730@partner.kit.edu>"]
channels = ["pytorch", "conda-forge"]
name = "multiatoms"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "pytest"
lint = "ruff check ."
format = "ruff format ."
bench = "python benchmarks/measure_duty_cycle.py"

[pypi-dependencies]
multiatoms = { path = ".", editable = true }

[dependencies]
python = ">=3.10"
numpy = "*"
ase = ">=3.22"
greenlet = ">=3"
pytorch = { version = ">=2.0", channel = "pytorch" }
pytest = "*"
ruff = "*"

# CPU PyTorch (laptop / default). `cpuonly` forces the CPU build.
[feature.cpu.dependencies]
cpuonly = { version = "*", channel = "pytorch" }

# GPU PyTorch (cluster). Match the CUDA version to your node's driver
# (`nvidia-smi` -> "CUDA Version"); 12.1 works with any >=12.1 driver.
[feature.gpu]
channels = ["nvidia", "pytorch", "conda-forge"]

[feature.gpu.system-requirements]
cuda = "12"

[feature.gpu.dependencies]
pytorch-cuda = { version = "12.1.*", channel = "pytorch" }

[environments]
default = { features = ["cpu"] }
gpu = { features = ["gpu"] }
